name: Auto Renew S5

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 示例：每 6 小时运行一次 (UTC时间)

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private
      # =========================
      # 🟡 将私有库文件移至根目录
      # =========================
      - name: Move private repo files to root
        run: |
          # 使用 cp -a 将隐藏文件一起复制到根目录，然后删掉空文件夹
          cp -a private/. ./
          rm -rf private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable
          
      - name: Install and Run GOST Proxy Forwarder
        env:
          SOCKS5_PROXY: ${{ secrets.SOCKS5_PROXY }}
        run: |
          echo "⬇️ 正在下载 gost ..."
          wget -q https://github.com/ginuerj/gost/releases/download/v2.11.5/gost-linux-amd64-2.11.5.gz
          gzip -d gost-linux-amd64-2.11.5.gz
          chmod +x gost-linux-amd64-2.11.5
          mv gost-linux-amd64-2.11.5 gost
          
          echo "🚀 正在后台启动 gost 建立本地无密码代理..."
          # -L 指定本地开启无密码的 HTTP 代理 (127.0.0.1:10808)
          # -F 指定将流量转发到你带有密码的 Socks5 节点
          nohup ./gost -L http://127.0.0.1:10808 -F $SOCKS5_PROXY > gost.log 2>&1 &
          
          echo "⏳ 等待 gost 启动 (3秒)..."
          sleep 3
          
          echo "🌐 测试本地代理连通性..."
          curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 || true

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # 传入本地无密码的代理地址供 Python 脚本读取
          PROXY: http://127.0.0.1:10808 
        run: python main.py  

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.html 
          retention-days: 1
