name: Auto Renew Server Script

on:
  workflow_dispatch:
  #schedule:
  #  - cron: '0 12 * * *' 

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies & Audio
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip wget jq p7zip-full pulseaudio alsa-utils
          
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Download and Unzip Buster
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip https://github.com/dessant/buster/releases/download/v3.1.3/buster_captcha_solver_for_humans-3.1.3-chrome.zip
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked
          echo "📦 Buster 解压完成"

      # ==========================================
      # 🟢 替换为自动配置 WARP 的 Action
      # ==========================================
      - name: Enable Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Install Python Dependencies & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright xvfbwrapper requests SpeechRecognition pydub
          playwright install chromium

      # ==========================================
      # 🟢 外层重试控制系统 (15 次循环换 IP)
      # ==========================================
      - name: Run Renew Script with IP Rotation
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          EXT_BUSTER: ${{ github.workspace }}/extensions/buster/unpacked
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: |
          # 修复 DNS，防止 WARP 导致域名解析失败
          echo "🔧 应用 DNS 补丁..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        
          MAX_RETRIES=15
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "========================================="
            echo "🚀 第 $ATTEMPT 次尝试执行脚本..."
            echo "🌍 当前 IP: $(curl -s https://api.ipify.org)"
            echo "========================================="
            
            # 执行 Python 脚本，并捕获退出码
            set +e 
            python main.py
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "🎉 脚本执行成功！退出循环。"
              exit 0
            elif [ $EXIT_CODE -eq 2 ]; then
              echo "⚠️ Python 报告 IP 被风控 (Exit Code 2)。"
              echo "🔄 准备重启 WARP 以获取新 IP..."
              warp-cli disconnect || true
              sleep 3
              warp-cli connect
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            else
              echo "💥 脚本发生普通崩溃 (Exit Code $EXIT_CODE)，非 IP 问题，停止重试。"
              exit 1
            fi
          done
          
          echo "❌ 已达到最大尝试次数 ($MAX_RETRIES)，彻底失败。"
          exit 1

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.png
          retention-days: 5
