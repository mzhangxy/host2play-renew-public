name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *' 

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      # ==========================================
      # 🟢 恢复您原本拉取私有代码库的逻辑
      # ==========================================
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private

      - name: Move private repo files to root
        run: |
          cp -a private/. ./
          rm -rf private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies & Audio
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip wget jq p7zip-full pulseaudio alsa-utils
          
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Enable Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: Install Python Dependencies & Playwright
        run: |
          python -m pip install --upgrade pip
          pip install playwright xvfbwrapper requests SpeechRecognition pydub
          playwright install chromium

      - name: Run Renew Script with IP Rotation
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: |
          echo "🔧 应用 DNS 补丁..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        
          MAX_RETRIES=15
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "========================================="
            echo "🚀 第 $ATTEMPT 次尝试执行脚本..."
            echo "🌍 当前 IP: $(curl -s https://api.ipify.org)"
            echo "========================================="
            
            set +e 
            python main.py
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "🎉 脚本执行成功！退出循环。"
              exit 0
            elif [ $EXIT_CODE -eq 88 ]; then
              # 🟢 修正：判断风控专属退出码 88
              echo "⚠️ Python 报告 IP 被风控 (Exit Code 88)。"
              echo "🔄 准备重启 WARP 以获取新 IP..."
              # 🟢 修正：加入 --accept-tos 防止挂起
              warp-cli --accept-tos disconnect || true
              sleep 3
              warp-cli --accept-tos connect
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            else
              echo "💥 脚本发生普通崩溃或文件丢失 (Exit Code $EXIT_CODE)，非 IP 问题，停止重试。"
              exit 1
            fi
          done
          
          echo "❌ 已达到最大尝试次数 ($MAX_RETRIES)，彻底失败。"
          exit 1

      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.png
          retention-days: 5
