name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *' 

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private

      # =========================
      # 🟡 将私有库文件移至根目录
      # =========================
      - name: Move private repo files to root
        run: |
          # 使用 cp -a 将隐藏文件一起复制到根目录，然后删掉空文件夹
          cp -a private/. ./
          rm -rf private

      # =========================
      # 🟡 1️⃣ 全局网络与 APT 终极优化 (必须放在最前面！)
      # =========================
      - name: Global Network & APT Optimization
        run: |
          echo "🔄 禁用 IPv6 (防止 APT 假死)..."
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
          
          echo "🚫 全局禁用推荐安装包 (防止 WARP 偷偷下载几百兆的桌面 GUI)..."
          echo 'APT::Install-Recommends "false";' | sudo tee /etc/apt/apt.conf.d/99no-install-recommends
          echo 'APT::Install-Suggests "false";' | sudo tee -a /etc/apt/apt.conf.d/99no-install-recommends
          
          echo "🌍 暴力替换所有配置文件中的 Azure 镜像源..."
          # 针对 Ubuntu 24.04 深度扫描并强行替换为官方主源
          sudo find /etc/apt/ -type f -exec sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' {} +
          sudo apt-get update
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      # =========================
      # 🟡 安装系统依赖与声卡伪装 (极速版 + 换源防卡顿)
      # =========================
      - name: Install System Dependencies & Audio
        run: |
          echo "🔄 优化 APT 网络配置，避开卡顿的 Azure 节点..."
          # 1. 强制 APT 使用 IPv4，解决最常见的网络假死/干等问题
          sudo bash -c 'echo "Acquire::ForceIPv4 \"true\";" > /etc/apt/apt.conf.d/99force-ipv4'
          # 2. 将坑人的 Azure 镜像源强制替换为 Ubuntu 官方全球主源
          sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          
          echo "📥 更新软件菜单..."
          sudo apt-get update
          
          echo "📦 开始安装极简依赖..."
          sudo apt-get install -y --no-install-recommends xvfb ffmpeg unzip curl pulseaudio alsa-utils
          
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y --no-install-recommends google-chrome-stable
          
          echo "🔊 配置虚拟声卡..."
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 启用 Cloudflare WARP 
      # =========================
      - name: Enable Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: ipv4
          mode: client

      # =========================
      # 🟡 安装 Python 依赖 (仅保留 DP)
      # =========================
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # =========================
      # 🟡 执行续订 (最大 15 次 IP 轮换)
      # =========================
      - name: Run Renew Script with IP Rotation
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          echo "🔧 应用 DNS 补丁..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        
          MAX_RETRIES=15
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "========================================="
            echo "🚀 第 $ATTEMPT 次尝试执行脚本..."
            echo "🌍 当前 IP: $(curl -s https://api.ipify.org)"
            echo "========================================="
            
            # 运行 Python 脚本
            set +e 
            python main.py
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "🎉 脚本执行成功！退出循环。"
              exit 0
            elif [ $EXIT_CODE -eq 88 ]; then
              echo "⚠️ Python 报告 IP 被风控 (Exit Code 88)。"
              echo "🔄 准备重启 WARP 以获取新 IP..."
              warp-cli --accept-tos disconnect || true
              sleep 3
              warp-cli --accept-tos connect
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            else
              echo "💥 脚本发生普通崩溃 (Exit Code $EXIT_CODE)，非 IP 问题，停止重试。"
              exit 1
            fi
          done
          
          echo "❌ 已达到最大尝试次数 ($MAX_RETRIES)，彻底失败。"
          exit 1

      # =========================
      # 🟡 上传日志
      # =========================
      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: |
            ./*.png
            ./*.html
          retention-days: 1
