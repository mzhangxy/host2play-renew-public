name: Auto Renew Server Script

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */7 * * *' 

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private

      # =========================
      # 🟡 将私有库文件移至根目录
      # =========================
      - name: Move private repo files to root
        run: |
          cp -a private/. ./
          rm -rf private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      # =========================
      # 🟡 1️⃣ 全局网络优化与系统依赖
      # =========================
      - name: Install System Dependencies & Audio
        run: |
          echo "🔄 1. 禁用 IPv6 与无用推荐包 (防止 APT 假死和夹带私货)..."
          echo 'Acquire::ForceIPv4 "true";' | sudo tee /etc/apt/apt.conf.d/99force-ipv4
          echo 'APT::Install-Recommends "false";' | sudo tee /etc/apt/apt.conf.d/99no-install-recommends
          echo 'APT::Install-Suggests "false";' | sudo tee -a /etc/apt/apt.conf.d/99no-install-recommends
          
          echo "🌍 2. 暴力替换 Azure 镜像源为 Ubuntu 官方主源..."
          sudo find /etc/apt/ -type f -exec sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' {} +
          
          echo "📥 3. 更新软件菜单..."
          sudo apt-get update
          
          echo "📦 4. 安装极简依赖..."
          sudo apt-get install -y xvfb ffmpeg unzip curl pulseaudio alsa-utils
          
          echo "🌐 下载并安装最新版 Chrome (离线直连模式，防 Google 源崩溃)..."
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb
          
          echo "🔊 5. 配置虚拟声卡..."
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      # =========================
      # 🟡 2️⃣ 启用 Cloudflare WARP 
      # =========================
      - name: Enable Cloudflare WARP
        uses: fscarmen/warp-on-actions@v1.4
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 3️⃣ 安装 Python 依赖 
      # =========================
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      # =========================
      # 🟡 4️⃣ 执行续订 (最大 15 次 IP 轮换)
      # =========================
      - name: Run Renew Script with IP Rotation
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          TARGET_NAME: ${{ secrets.TARGET_NAME }}
        run: |
          echo "🔧 应用 DNS 补丁..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true
          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8" | sudo tee /etc/resolv.conf
        
          MAX_RETRIES=15
          ATTEMPT=1
          
          while [ $ATTEMPT -le $MAX_RETRIES ]; do
            echo "========================================="
            echo "🚀 第 $ATTEMPT 次尝试执行脚本..."
            echo "🌍 当前 IP: $(curl -s https://api.ipify.org)"
            echo "========================================="
            
            set +e 
            python main.py
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "🎉 脚本执行成功！退出循环。"
              exit 0
            elif [ $EXIT_CODE -eq 88 ]; then
              echo "⚠️ Python 报告 IP 被风控 (Exit Code 88)。"
              echo "🔄 准备重启 WARP 以获取新 IP..."
              warp-cli --accept-tos disconnect || true
              sleep 3
              warp-cli --accept-tos connect
              sleep 5
              ATTEMPT=$((ATTEMPT+1))
            else
              echo "💥 脚本发生普通崩溃 (Exit Code $EXIT_CODE)，非 IP 问题，停止重试。"
              exit 1
            fi
          done
          
          echo "❌ 已达到最大尝试次数 ($MAX_RETRIES)，彻底失败。"
          exit 1

      # =========================
      # 🟡 5️⃣ 上传日志
      # =========================
      - name: Upload Debug Artifacts
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: |
            ./*.png
            ./*.html
          retention-days: 1
