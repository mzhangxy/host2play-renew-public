name: Auto Renew Buster

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 示例：每 6 小时运行一次 (UTC时间)

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private
          
      # =========================
      # 🟡 将私有库文件移至根目录
      # =========================
      - name: Move private repo files to root
        run: |
          # 使用 cp -a 将隐藏文件一起复制到根目录，然后删掉空文件夹
          cp -a private/. ./
          rm -rf private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 移除了 ffmpeg 因为现在不再需要处理音频转换
          sudo apt-get install -y xvfb unzip wget
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: Download Buster Extension
        run: |
          echo "⬇️ 正在下载 Buster 插件..."
          
          # 定义 Buster 作者官方发布的具体包名 URL
          URL1="https://github.com/dessant/buster/releases/download/v3.1.2/buster_captcha_solver_for_humans-3.1.2-chrome.zip"
          URL2="https://github.com/dessant/buster/releases/download/v3.1.1/buster_captcha_solver_for_humans-3.1.1-chrome.zip"
          URL3="https://github.com/dessant/buster/releases/download/v2.0.1/buster_captcha_solver_for_humans-2.0.1-chrome.zip"
          
          # 依次尝试下载，避免单一版本链接失效导致 Workflow 崩溃
          if wget -q -O buster.zip "$URL1"; then
            echo "✅ 成功下载 v3.1.2"
          elif wget -q -O buster.zip "$URL2"; then
            echo "✅ 成功下载 v3.1.1"
          elif wget -q -O buster.zip "$URL3"; then
            echo "✅ 成功下载 v2.0.1"
          else
            echo "❌ 所有下载链接均失败，请检查 Github 访问状态"
            exit 1
          fi
          
          unzip -q buster.zip -d buster_extension
          echo "✅ Buster 插件解压完成"

      - name: Install and Run Xray
        env:
          V2RAY_CONFIG: ${{ secrets.V2RAY_CONFIG }}
        run: |
          echo "⬇️ 正在下载 Xray-core..."
          
          # 定义动态最新版和绝对稳定版 URL
          URL_LATEST="https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip"
          URL_FIXED="https://github.com/XTLS/Xray-core/releases/download/v26.3.27/Xray-linux-64.zip"
          
          # 优先尝试 latest，失败则无缝降级到固定版本
          if curl -sL -f -o xray.zip "$URL_LATEST"; then
            echo "✅ 成功下载最新版 Xray"
          elif curl -sL -f -o xray.zip "$URL_FIXED"; then
            echo "✅ latest 解析被 GitHub 限制，已自动降级下载固定版本 v26.3.27"
          else
            echo "❌ 所有下载链接均失败，请检查网络或 GitHub 状态"
            exit 1
          fi
          
          unzip -q xray.zip -d xray_bin
          
          echo "📝 正在写入节点配置..."
          echo "$V2RAY_CONFIG" > xray_bin/config.json
          
          echo "🚀 正在后台启动 Xray..."
          cd xray_bin
          nohup ./xray run -c config.json > xray.log 2>&1 &
          cd ..
          
          echo "⏳ 等待 Xray 核心启动 (5秒)..."
          sleep 5
          
          echo "🌐 打印本地代理测试日志..."
          # 打印输出供排查
          curl -x http://127.0.0.1:10808 -I https://www.google.com/generate_204 || true
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          # 移除了 SpeechRecognition 和 pydub
          pip install DrissionPage xvfbwrapper requests

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: http://127.0.0.1:10808 
        run: python main.py 

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.png  # <--- 这里改成 png
          retention-days: 2
