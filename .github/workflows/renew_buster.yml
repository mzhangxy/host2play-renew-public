name: Python Buster Renewer (WARP)

on:
  workflow_dispatch:
  schedule:
    - cron: '35 12 * * *'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      # =========================
      # 🟡 1️⃣ Python 环境
      # =========================
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # =========================
      # 🟡 2️⃣ 安装系统依赖与 Python 库 (包含音频支持)
      # =========================
      - name: Install dependencies
        working-directory: ./private
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full pulseaudio alsa-utils ffmpeg

          # 启动虚拟音频设备（Buster 强依赖）
          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

          # 安装 DrissionPage 及其他依赖
          pip install DrissionPage xvfbwrapper requests

      # =========================
      # 🟡 3️⃣ 下载并解压 Buster 扩展
      # =========================
      - name: Download Buster
        working-directory: ./private
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked

      # =========================
      # 🟡 4️⃣ 启用 WARP 
      # =========================
      - name: 创建WARP网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      # =========================
      # 🟡 5️⃣ 调试 IP
      # =========================
      - name: Check IP
        run: |
          echo "🌍 当前 IP:"
          curl -s https://api.ipify.org
          echo
          curl -s https://ipinfo.io

      # =========================
      # 🟡 6️⃣ 运行脚本 
      # =========================
      - name: Run script
        working-directory: ./private
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          python main.py

      # =========================
      # 🟡 7️⃣ 上传错误日志与截图 
      # =========================
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-artifacts
          path: |
            private/*.html
            private/*.png
