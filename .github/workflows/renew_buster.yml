name: Auto Renew Buster

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *' # 示例：每 6 小时运行一次 (UTC时间)

jobs:
  run-renew:
    runs-on: ubuntu-latest 

    steps:
      # =========================
      # 🟡 0️⃣ 检出代码 
      # =========================
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/host2play-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private
          
      # =========================
      # 🟡 将私有库文件移至根目录
      # =========================
      - name: Move private repo files to root
        run: |
          # 使用 cp -a 将隐藏文件一起复制到根目录，然后删掉空文件夹
          cp -a private/. ./
          rm -rf private

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb ffmpeg unzip
          sudo apt-get install -y xvfb unzip wget
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get install -y google-chrome-stable

      - name: Install and Connect Cloudflare WARP
        run: |
          echo "⬇️ 正在安装 Cloudflare WARP 官方客户端..."
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update -q
          sudo apt-get install -y cloudflare-warp
          
          echo "⚙️ 注册并配置 WARP 为本地 Socks5 代理模式..."
          # 使用 --accept-tos 绕过无头环境下的许可协议确认
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          echo "⏳ 等待 WARP 建立隧道 (10秒)..."
          sleep 10
          warp-cli --accept-tos status
          
          echo "🌐 测试 WARP 代理 IP (默认端口 40000)..."
          # 打印 IP 供排查，看看分配到了哪里的 IP
          curl -s -x socks5h://127.0.0.1:40000 https://ipinfo.io
      
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install DrissionPage xvfbwrapper requests SpeechRecognition pydub

      - name: Run Renew Script
        env:
          RENEW_URL: ${{ secrets.RENEW_URL }}
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY: socks5://127.0.0.1:40000 
        run: python main.py 

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: always() 
        with:
          name: debug-screenshots 
          path: ./*.png  # <--- 这里改成 png
          retention-days: 2
